<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html,
      body {
        font-family:
          "Inter",
          "Noto Sans KR",
          ui-sans-serif,
          system-ui,
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* 정삼각형에 가깝게: 밑변=너비, 높이=√3/2 × 너비 */
      .shape-tri-eq {
        width: 2rem;
        height: calc(2rem * 0.8660254);
        clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        border-radius: 2px;
      }
      .shape-tri-eq-sm {
        width: 0.75rem;
        height: calc(0.75rem * 0.8660254);
        clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        border-radius: 2px;
      }
      .shape-pent-codex {
        width: 2rem;
        height: 2rem;
        clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
        border-radius: 2px;
      }
      .shape-star-codex {
        width: 2rem;
        height: 2rem;
        clip-path: polygon(
          50% 0%,
          64% 34%,
          98% 35%,
          70% 58%,
          82% 92%,
          50% 74%,
          18% 92%,
          30% 58%,
          2% 35%,
          36% 34%
        );
        border-radius: 2px;
      }
      .shape-pent-sm {
        width: 0.75rem;
        height: 0.75rem;
        clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
        border-radius: 2px;
      }
      .shape-star-sm {
        width: 0.8rem;
        height: 0.8rem;
        clip-path: polygon(
          50% 0%,
          64% 34%,
          98% 35%,
          70% 58%,
          82% 92%,
          50% 74%,
          18% 92%,
          30% 58%,
          2% 35%,
          36% 34%
        );
        border-radius: 2px;
      }
      .shape-pent {
        width: 2rem;
        height: 2rem;
        clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
        border-radius: 2px;
      }
      .shape-star {
        width: 2rem;
        height: 2rem;
        clip-path: polygon(
          50% 0%,
          64% 34%,
          98% 35%,
          70% 58%,
          82% 92%,
          50% 74%,
          18% 92%,
          30% 58%,
          2% 35%,
          36% 34%
        );
        border-radius: 2px;
      }
      .shape-semi {
        width: 2rem;
        height: 2rem;
        background: white;
        clip-path: inset(0 0 50% 0);
        border-radius: 9999px;
        transform: rotate(-45deg);
      }
      .shape-semi-sm {
        width: 0.8rem;
        height: 0.8rem;
        background: white;
        clip-path: inset(0 0 50% 0);
        border-radius: 9999px;
        transform: rotate(-45deg);
      }
      .shape-semi-codex {
        width: 2rem;
        height: 2rem;
        background: white;
        clip-path: inset(0 0 50% 0);
        border-radius: 9999px;
        transform: rotate(-45deg);
      }
      .shape-rect-h {
        width: 2.25rem;
        height: 1.25rem;
        background: white;
        border-radius: 3px;
      }
      .shape-rect-v {
        width: 1.25rem;
        height: 2.25rem;
        background: white;
        border-radius: 3px;
      }
      .shape-rect-h-sm {
        width: 1rem;
        height: 0.55rem;
        background: white;
        border-radius: 2px;
      }
      .shape-rect-v-sm {
        width: 0.55rem;
        height: 1rem;
        background: white;
        border-radius: 2px;
      }
      .shape-rect-h-codex {
        width: 2rem;
        height: 1.1rem;
        background: white;
        border-radius: 3px;
      }
      .shape-rect-v-codex {
        width: 1.1rem;
        height: 2rem;
        background: white;
        border-radius: 3px;
      }
      .shape-cross {
        width: 2rem;
        height: 2rem;
        background: white;
        clip-path: polygon(
          35% 0%,
          65% 0%,
          65% 35%,
          100% 35%,
          100% 65%,
          65% 65%,
          65% 100%,
          35% 100%,
          35% 65%,
          0% 65%,
          0% 35%,
          35% 35%
        );
        border-radius: 2px;
      }
      .shape-cross-sm {
        width: 0.8rem;
        height: 0.8rem;
        background: white;
        clip-path: polygon(
          35% 0%,
          65% 0%,
          65% 35%,
          100% 35%,
          100% 65%,
          65% 65%,
          65% 100%,
          35% 100%,
          35% 65%,
          0% 65%,
          0% 35%,
          35% 35%
        );
        border-radius: 2px;
      }
      .shape-cross-codex {
        width: 2rem;
        height: 2rem;
        background: white;
        clip-path: polygon(
          35% 0%,
          65% 0%,
          65% 35%,
          100% 35%,
          100% 65%,
          65% 65%,
          65% 100%,
          35% 100%,
          35% 65%,
          0% 65%,
          0% 35%,
          35% 35%
        );
        border-radius: 2px;
      }
      .shape-arrow {
        width: 2rem;
        height: 2rem;
        background: white;
        clip-path: polygon(
          50% 0%,
          90% 55%,
          65% 55%,
          65% 100%,
          35% 100%,
          35% 55%,
          10% 55%
        );
        border-radius: 2px;
      }
      .shape-arrow-sm {
        width: 0.85rem;
        height: 0.85rem;
        background: white;
        clip-path: polygon(
          50% 0%,
          90% 55%,
          65% 55%,
          65% 100%,
          35% 100%,
          35% 55%,
          10% 55%
        );
        border-radius: 2px;
      }
      .shape-arrow-codex {
        width: 2rem;
        height: 2rem;
        background: white;
        clip-path: polygon(
          50% 0%,
          90% 55%,
          65% 55%,
          65% 100%,
          35% 100%,
          35% 55%,
          10% 55%
        );
        border-radius: 2px;
      }

      @keyframes shake-tiny {
        0% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-1px);
        }
        50% {
          transform: translateX(1px);
        }
        75% {
          transform: translateX(-1px);
        }
        100% {
          transform: translateX(0);
        }
      }
      .shake-tiny {
        animation: shake-tiny 160ms ease-in-out 0s 2;
      }

      /* 버프 태두리(파랑/초록 분할 표시) */
      .buff-ring {
        position: relative;
      }
      .buff-ring::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 0px;
        pointer-events: none;
        z-index: 2;
        border: 1px solid transparent;
        border-image: conic-gradient(
            from -90deg,
            rgba(56, 189, 248, 0.95) 0 var(--buff-blue-pct, 100%),
            rgba(34, 197, 94, 0.95) var(--buff-blue-pct, 100%) 100%
          )
          1;
      }

      .shape-tri-eq-codex {
        width: 2rem;
        height: calc(2rem * 0.8660254);
        clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        border-radius: 3px;
      }
    </style>
  </head>
  <body
    id="body-root"
    class="theme-dark-body m-0 min-h-screen bg-[#050505] text-white antialiased transition-colors duration-200"
  >
    <!-- Tailwind 샘플 (동적 클래스 생성용) -->
    <div class="hidden" aria-hidden="true">
      <div
        class="grid grid-cols-2 grid-rows-2 grid-cols-3 grid-rows-3 grid-cols-4 grid-rows-4 grid-cols-5 grid-rows-5"
        aria-hidden="true"
      ></div>
      <div
        id="cell-class-sample"
        class="w-[60px] h-[60px] box-border border-r border-b border-gray-600 shrink-0 flex items-center justify-center cursor-pointer select-none group relative"
      ></div>
      <span class="block rounded-full bg-white w-8 h-8"></span>
      <span class="block bg-white w-7 h-7 rounded-sm"></span>
      <span class="block bg-white shape-tri-eq"></span>
      <span class="block rounded-full bg-white w-3 h-3"></span>
      <span class="block bg-white w-2.5 h-2.5 rounded-sm"></span>
      <span class="block bg-white shape-tri-eq-sm"></span>
      <div
        class="ring-2 ring-white/80 shadow-[0_0_14px_rgba(255,255,255,0.45)] border-r border-b border-white/50 z-[1] relative"
      ></div>
      <div
        class="pointer-events-auto cursor-pointer p-2 z-[6] flex items-center justify-center"
      ></div>
      <div class="scatter-hit flex items-center justify-center rounded-md p-3"></div>
      <span class="block bg-white shape-tri-eq-codex"></span>
      <span
        class="rounded-full w-3 h-3 shrink-0 bg-emerald-400 ring-1 ring-emerald-300/80 shadow-[0_0_8px_rgba(52,211,153,0.55)]"
      ></span>
      <span
        class="rounded-full w-3 h-3 shrink-0 bg-amber-400 ring-1 ring-amber-200/90 shadow-[0_0_10px_rgba(251,191,36,0.72)]"
      ></span>
      <span
        class="h-8 w-8 shrink-0 rounded-full bg-emerald-400 ring-1 ring-emerald-300/70 shadow-[0_0_12px_rgba(52,211,153,0.45)]"
      ></span>
      <span
        class="h-8 w-8 shrink-0 rounded-full bg-amber-400 ring-1 ring-amber-200/85"
      ></span>
      <span
        class="h-8 w-8 shrink-0 rounded-sm bg-amber-400 ring-1 ring-amber-200/85 shadow-[0_0_14px_rgba(251,191,36,0.55)]"
      ></span>
      <span
        class="h-3 w-3 shrink-0 rounded-sm bg-amber-400 ring-1 ring-amber-200/85"
      ></span>
      <div class="shadow-[inset_0_0_0_2px_rgba(52,211,153,0.55)]"></div>
      <span
        class="h-8 w-8 shrink-0 bg-emerald-400 shape-tri-eq-codex ring-1 ring-emerald-300/70"
      ></span>
      <div
        class="fixed z-[100] invisible opacity-0 pointer-events-none rounded-lg border px-3 py-2 text-xs shadow-xl transition-opacity"
      ></div>
    </div>

    <div
      class="flex min-h-screen flex-col lg:flex-row lg:items-stretch"
    >
      <!-- 왼쪽: 인벤토리 + 바깥 토글 -->
      <div
        id="inventory-shell"
        class="sidebar-root order-2 flex w-full shrink-0 flex-row items-stretch border-t border-white/10 bg-[#0a0a0a] lg:order-1 lg:w-auto lg:min-h-screen lg:max-h-screen lg:flex-shrink-0 lg:border-r lg:border-t-0"
      >
        <aside
          id="inventory-aside"
          class="flex min-h-0 min-w-0 flex-1 flex-col justify-center overflow-hidden p-4 text-white transition-[width,padding] duration-300 ease-out lg:w-72 lg:flex-none lg:p-4"
        >
          <div id="inventory-content" class="min-w-0 w-full">
            <div
              class="w-full rounded-xl border border-white/10 bg-[#111] p-4 shadow-lg ring-1 ring-white/5"
              aria-live="polite"
              aria-label="인벤토리"
            >
              <h2
                class="mb-3 border-b border-white/10 pb-2 text-xs font-semibold uppercase tracking-widest text-white/50"
              >
                인벤토리
              </h2>
              <p class="mb-3 text-[11px] text-white/40">획득한 도형 개수</p>
              <div
                id="player-inventory-ui"
                class="flex flex-col gap-2 text-sm"
              >
                <div
                  id="inv-row-circle"
                  class="hidden flex items-center justify-between rounded-lg bg-black/30 px-3 py-2 ring-1 ring-white/5"

                  <span class="flex items-center gap-2.5 text-white/70"
                    ><span
                      class="inline-flex h-6 w-6 shrink-0 items-center justify-center"
                      aria-hidden="true"
                      ><span
                        class="h-3 w-3 rounded-full bg-white ring-1 ring-white/30"
                      ></span></span
                    >원</span
                  >
                  <strong id="inv-count-circle" class="text-lg text-white tabular-nums"
                    >0</strong
                  >
                </div>
                <div
                  id="inv-row-square"
                  class="flex items-center justify-between rounded-lg bg-black/30 px-3 py-2 ring-1 ring-white/5 hidden"
                >
                  <span class="flex items-center gap-2.5 text-white/70"
                    ><span
                      class="inline-flex h-6 w-6 shrink-0 items-center justify-center"
                      aria-hidden="true"
                      ><span
                        class="h-3 w-3 rounded-sm bg-white ring-1 ring-white/25"
                      ></span></span
                    >사각형</span
                  >
                  <strong id="inv-count-square" class="text-lg text-white tabular-nums"
                    >0</strong
                  >
                </div>
                <div
                  id="inv-row-triangle"
                  class="flex items-center justify-between rounded-lg bg-black/30 px-3 py-2 ring-1 ring-white/5 hidden"
                >
                  <span class="flex items-center gap-2.5 text-white/70"
                    ><span
                      class="inline-flex h-6 w-6 shrink-0 items-center justify-center"
                      aria-hidden="true"
                      ><span
                        class="block shrink-0 bg-white shape-tri-eq-sm"
                      ></span></span
                    >삼각형</span
                  >
                  <strong
                    id="inv-count-triangle"
                    class="text-lg text-white tabular-nums"

                  >
                </div>
                <div

                  <span class="flex items-center gap-2.5 text-white/70"

                      class="inline-flex h-6 w-6 shrink-0 items-center justify-center"
                      aria-hidden="true"

                    >오각형</span

                  <strong

                    class="text-lg text-white tabular-nums"

                </div>
                <div

                  class="flex items-center justify-between rounded-lg bg-black/30 px-3 py-2 ring-1 ring-white/5 hidden"
                >
                  <span class="flex items-center gap-2.5 text-white/70"
                    ><span
                      class="inline-flex h-6 w-6 shrink-0 items-center justify-center"
                      aria-hidden="true"
                      ><span class="block shrink-0 bg-white shape-star-sm"></span></span
                    >별</span
                  >
                  <strong id="inv-count-star" class="text-lg text-white tabular-nums"
                    >0</strong
                  >
                </div>
                <div
                  id="inv-row-semi"
                  class="flex items-center justify-between rounded-lg bg-black/30 px-3 py-2 ring-1 ring-white/5 hidden"

                  <span class="flex items-center gap-2.5 text-white/70"
                    ><span
                      class="inline-flex h-6 w-6 shrink-0 items-center justify-center"
                      aria-hidden="true"
                      ><span class="block shrink-0 shape-semi-sm"></span></span
                    >반원</span
                  >
                  <strong id="inv-count-semi" class="text-lg text-white tabular-nums"
                    >0</strong
                  >
                </div>
                <div
                  id="inv-row-rect-h"
                  class="flex items-center justify-between rounded-lg bg-black/30 px-3 py-2 ring-1 ring-white/5 hidden"
                >
                  <span class="flex items-center gap-2.5 text-white/70"
                    ><span
                      class="inline-flex h-6 w-6 shrink-0 items-center justify-center"
                      aria-hidden="true"
                      ><span class="block shrink-0 shape-rect-h-sm"></span></span
                    >직사각형(가로)</span
                  >
                  <strong id="inv-count-rect-h" class="text-lg text-white tabular-nums"
                    >0</strong
                  >
                </div>
                <div
                  id="inv-row-rect-v"
                  class="flex items-center justify-between rounded-lg bg-black/30 px-3 py-2 ring-1 ring-white/5 hidden"
                >
                  <span class="flex items-center gap-2.5 text-white/70"
                    ><span
                      class="inline-flex h-6 w-6 shrink-0 items-center justify-center"
                      aria-hidden="true"
                      ><span class="block shrink-0 shape-rect-v-sm"></span></span
                    >직사각형(세로)</span
                  >
                  <strong id="inv-count-rect-v" class="text-lg text-white tabular-nums"

                </div>
                <div

          aria-label="게임 영역"

            class="relative max-w-full shrink-0 rounded-[3px]"

        </div>

      <!-- 오른쪽: 바깥 토글 + 도감 -->

        id="codex-shell"
        class="sidebar-root order-3 flex w-full shrink-0 flex-row items-stretch border-t border-white/10 bg-[#0a0a0a] lg:order-3 lg:w-auto lg:min-h-screen lg:max-h-screen lg:flex-shrink-0 lg:border-l lg:border-t-0"
      >

          class="flex shrink-0 items-center justify-center self-center rounded-md p-2 text-white/55 transition hover:bg-white/5 hover:text-white focus:outline-none focus-visible:ring-2 focus-visible:ring-white/25"

          aria-controls="codex-content"
          aria-label="도감 접기"

        <aside
          id="codex-aside"
          class="flex min-h-0 min-w-0 flex-1 flex-col justify-start overflow-hidden p-4 text-white transition-[width,padding] duration-300 ease-out lg:w-80 lg:flex-none lg:min-h-0 lg:p-4"

      (function () {
        /**
         * @typedef {null | "circle" | "square" | "triangle" | "pentagon" | "star" | "semi" | "rect_h" | "rect_v" | "cross" | "arrow"} CellType

         * @typedef {{ type: CellType, growthTime: number, isReady: boolean, plantedAt: number | null, matureAt: number | null, dir: ArrowDir }} GridCell
         */

        /** @type {CellType[]} */
        const SHAPE_TYPES = [
          "circle",
          "triangle",
          "square",
          "pentagon",
          "star",
          "semi",
          "rect_h",
          "rect_v",
          "cross",

        const CELL_PX = 60;

        const GRID_EXPAND_COST_KEYS = [

        /**
         * 확장 후 목표 한 변 칸 수(3~5)별 비용. 3 = 2×2→3×3, 4 = 3×3→4×4, 5 = 4×4→5×5

            square: 1,
            triangle: 0,

            square: 2,

          if (type === "cross") return 300_000;

          if (r < 0 || c < 0 || r >= gridSize || c >= gridSize) return false;

          if (!src || src.type !== "semi" || !src.isReady || src.matureAt == null)

          const life = mutationLifespanMs(src.type);
          if (life == null) return false;
          return Date.now() - src.matureAt < life;

        function cellHasActiveSemiBuff(r, c) {
          return semiBuffSourceActiveAt(r - 1, c - 1);

        const CELL_READY_CLASS =

        function rectHSourceActiveAt(r, c) {
          if (r < 0 || c < 0 || r >= gridSize || c >= gridSize) return false;
          const src = GridState.cells[r][c];
          if (!src || src.type !== "rect_h" || !src.isReady || src.matureAt == null)

          const life = mutationLifespanMs(src.type);
          if (life == null) return false;
          return Date.now() - src.matureAt < life;

        function rectVSourceActiveAt(r, c) {
          if (r < 0 || c < 0 || r >= gridSize || c >= gridSize) return false;
          const src = GridState.cells[r][c];
          if (!src || src.type !== "rect_v" || !src.isReady || src.matureAt == null)

          const life = mutationLifespanMs(src.type);
          if (life == null) return false;
          return Date.now() - src.matureAt < life;

        function crossSourceActiveAt(r, c) {
          if (r < 0 || c < 0 || r >= gridSize || c >= gridSize) return false;
          const src = GridState.cells[r][c];
          if (!src || src.type !== "cross" || !src.isReady || src.matureAt == null)
            return false;
          const life = mutationLifespanMs(src.type);
          if (life == null) return false;
          return Date.now() - src.matureAt < life;
        }

        /** @param {ArrowDir} dir */
        function arrowRayAffects(dir, srcR, srcC, r, c) {
          if (!dir) return false;
          // 보는 방향 "쪽" 1줄만, 자기 칸은 제외
          if (dir === "up") return c === srcC && r < srcR;
          if (dir === "down") return c === srcC && r > srcR;
          if (dir === "left") return r === srcR && c < srcC;
          if (dir === "right") return r === srcR && c > srcC;
          return false;
        }

        function arrowSourceActiveAt(r, c) {
          if (r < 0 || c < 0 || r >= gridSize || c >= gridSize) return false;
          const src = GridState.cells[r][c];
          if (!src || src.type !== "arrow" || !src.isReady || src.matureAt == null)

          const life = mutationLifespanMs(src.type);
          if (life == null) return false;
          return Date.now() - src.matureAt < life;

         * 이 칸에 부여된 버프 목록.
         * - 같은 작물이 주는 버프는 중첩되지 않음(타입당 최대 1회)
         * - 다른 작물이 주는 버프는 합연산으로 중첩
         * @returns {{ sourceType: CellType, kind: "growth_reduction" | "bonus_double", reduction?: number, chance?: number }[]}
         */
        function cellBuffsFor(r, c) {
          const buffs = [];
          if (cellHasActiveSemiBuff(r, c))
            buffs.push({ sourceType: "semi", kind: "growth_reduction", reduction: 0.1 });
          const hasRectH = rectHSourceActiveAt(r, c - 1) || rectHSourceActiveAt(r, c + 1);
          if (hasRectH)
            buffs.push({ sourceType: "rect_h", kind: "growth_reduction", reduction: 0.1 });
          const hasRectV = rectVSourceActiveAt(r - 1, c) || rectVSourceActiveAt(r + 1, c);
          if (hasRectV)
            buffs.push({ sourceType: "rect_v", kind: "growth_reduction", reduction: 0.1 });
          const hasCross =
            crossSourceActiveAt(r - 1, c) ||
            crossSourceActiveAt(r + 1, c) ||
            crossSourceActiveAt(r, c - 1) ||
            crossSourceActiveAt(r, c + 1);
          if (hasCross)
            buffs.push({ sourceType: "cross", kind: "growth_reduction", reduction: 0.1 });

          // 화살표 버프: 같은 작물(arrow) 중첩 없음 → 하나라도 있으면 1개만
          let hasArrow = false;
          for (let sr = 0; sr < gridSize && !hasArrow; sr++) {
            for (let sc = 0; sc < gridSize && !hasArrow; sc++) {
              const src = GridState.cells[sr][sc];
              if (!src || src.type !== "arrow") continue;
              if (!arrowSourceActiveAt(sr, sc)) continue;
              if (arrowRayAffects(src.dir, sr, sc, r, c)) {
                hasArrow = true;
              }
            }
          }
          if (hasArrow)
            buffs.push({ sourceType: "arrow", kind: "bonus_double", chance: 0.2 });

          return buffs;
        }

        /** @returns {GridCell} */
        function createEmptyCell() {
          return {
            type: null,
            growthTime: 0,
            isReady: false,
            plantedAt: null,
            lastWaterAt: 0,
            matureAt: null,
            dir: null,
          };
        }

        function createGridData() {
          return Array.from({ length: gridSize }, () =>
            Array.from({ length: gridSize }, () => createEmptyCell())
          );
        }

        /**
         * @param {CellType} type
         * @returns {number}
         */
        function growthTimeMsForCellType(type) {
          if (type === "circle") return 30_000;
          if (type === "triangle") return 45_000;
          if (type === "square") return 75_000;
          if (type === "pentagon") return 120_000;
          if (type === "star") return 180_000;
          if (type === "semi") return 40_000;
          if (type === "rect_h") return 90_000;
          if (type === "rect_v") return 90_000;
          if (type === "cross") return 120_000;
          if (type === "arrow") return 60_000;
          return 30_000;
        }

        const PLANTABLE_KEYS = [
          "circle",
          "triangle",
          "square",
          "pentagon",
          "star",
          "semi",
          "rect_h",
          "rect_v",
          "cross",
          "arrow",
        ];

        /** @param {string} seedKey */
        function plantSpecFromSeedKey(seedKey) {
          if (SHAPE_TYPES.includes(seedKey)) return { type: seedKey };
          return null;
        }

        /**
         * @param {string} seedKey
         */
        function seedLabelKo(seedKey) {
          const m = SHAPE_META[seedKey];
          return m ? m.name : seedKey;
        }

        /** 빈 칸 심기 패널: 씨앗 이름 글씨색 */
        function plantSelectSeedLabelClass(seedKey) {
          return "font-medium text-white";
        }

        /**
         * @param {GridCell} cell
         */
        function plantedCellTitleKo(cell) {
          if (!cell.type) return "";
          return SHAPE_META[cell.type].name;
        }

        /** 게임 시작 인벤 — 임시: 모든 작물 1개씩 */
        const playerInventory = {
          circle: 1,
          triangle: 1,
          square: 1,
          pentagon: 1,
          star: 1,
          semi: 1,
          rect_h: 1,
          rect_v: 1,
          cross: 1,
          arrow: 1,
        };

        /** @param {number} nextSide 확장 후 한 변 칸 수 (3~5) */
        function canAffordGridExpand(nextSide) {
          const cost = GRID_EXPAND_COST[nextSide];
          if (!cost) return false;
          return GRID_EXPAND_COST_KEYS.every(function (k) {
            return (playerInventory[k] || 0) >= (cost[k] || 0);
          });
        }

        /** @param {number} nextSide */
        function payGridExpandCost(nextSide) {
          const cost = GRID_EXPAND_COST[nextSide];
          if (!cost) return;
          GRID_EXPAND_COST_KEYS.forEach(function (k) {
            const n = cost[k] || 0;
            if (n > 0) playerInventory[k] -= n;
          });

          square: 0,

        /** 도감 카드 표시 순: 기본 도형 → 초록 변이 → 황금 변이 */

        /** @param {CellType} harvested */
        function selfSeedDropChance(harvested) {
          if (harvested === "circle") return 1.0;
          if (harvested === "triangle") return 0.85;
          if (harvested === "square") return 0.7;
          if (harvested === "pentagon") return 0.5;

          if (harvested === "circle") return ["triangle", "circle"];
          if (harvested === "triangle") return ["square", "triangle"];
          if (harvested === "square") return ["pentagon", "square"];
          if (harvested === "pentagon") return ["star", "pentagon"];
          if (harvested === "star") return ["star", "pentagon"];
          if (harvested === "semi") return [null, null];
          return [null, null];

        /** @param {CellType} harvested */
        function harvestDropsFor(harvested) {
          /** @type {string[]} */
          const drops = [];
          const didSelfDrop = Math.random() < selfSeedDropChance(harvested);
          if (didSelfDrop) drops.push(harvested);
          if (harvested === "circle" && Math.random() < 0.075) drops.push("semi");
          if (harvested === "square" && Math.random() < 0.075) drops.push("rect_h");
          if (harvested === "square" && Math.random() < 0.075) drops.push("rect_v");
          if (harvested === "triangle" && Math.random() < 0.075) drops.push("arrow");
          const pair = extraSeedPairsFor(harvested);
          if (pair[0] && Math.random() < 0.15) drops.push(pair[0]);
          if (pair[1] && Math.random() < 0.15) drops.push(pair[1]);
          return drops;

        const WATER_COOLDOWN_MS = 2000;
        const WATER_REDUCE_MS = 1000;

        const waterCdUi = {
          /** @type {number} */
          until: 0,
          /** @type {number} */
          x: 0,
          /** @type {number} */
          y: 0,
          /** @type {number | null} */
          raf: null,
        };

        const waterCdEl = document.getElementById("water-cooldown-ui");
        const waterCdRing = waterCdEl?.querySelector("[data-water-cd-ring]");
        const waterCdCirc = 2 * Math.PI * 5.75; // r=5.75

        function placeWaterCdUi(clientX, clientY) {
          if (!waterCdEl) return;
          // 커서 "왼쪽 위"
          const ox = -14;
          const oy = -14;
          waterCdEl.style.transform =
            "translate(" + (clientX + ox) + "px, " + (clientY + oy) + "px)";
        }

        function stopWaterCdUi() {
          if (waterCdUi.raf !== null) {
            cancelAnimationFrame(waterCdUi.raf);
            waterCdUi.raf = null;
          }
          if (waterCdEl) waterCdEl.classList.add("hidden");
        }

        function tickWaterCdUi() {
          const now = Date.now();
          const left = Math.max(0, waterCdUi.until - now);
          const p = Math.max(0, Math.min(1, left / WATER_COOLDOWN_MS));
          if (waterCdRing) {
            waterCdRing.setAttribute("stroke-dasharray", String(waterCdCirc));
            waterCdRing.setAttribute(
              "stroke-dashoffset",
              String(waterCdCirc * (1 - p))
            );
          }
          placeWaterCdUi(waterCdUi.x, waterCdUi.y);
          if (left <= 0) {
            stopWaterCdUi();
            return;
          }
          waterCdUi.raf = requestAnimationFrame(tickWaterCdUi);
        }

        function startWaterCdUi(clientX, clientY) {
          waterCdUi.x = clientX;
          waterCdUi.y = clientY;
          waterCdUi.until = Date.now() + WATER_COOLDOWN_MS;
          if (waterCdEl) waterCdEl.classList.remove("hidden");
          if (waterCdRing) {
            waterCdRing.setAttribute("stroke-dasharray", String(waterCdCirc));
            waterCdRing.setAttribute("stroke-dashoffset", "0");
          }
          if (waterCdUi.raf !== null) cancelAnimationFrame(waterCdUi.raf);
          waterCdUi.raf = requestAnimationFrame(tickWaterCdUi);
        }

        document.addEventListener("mousemove", function (e) {
          if (Date.now() >= waterCdUi.until) return;
          waterCdUi.x = e.clientX;
          waterCdUi.y = e.clientY;
        });

        function tryWaterCell(r, c, clientX, clientY) {
          const cell = GridState.getCell(r, c);
          if (!cell || cell.type === null) return false;
          if (cell.isReady) return false;
          if (cell.plantedAt == null) return false;
          const now = Date.now();
          const last = cell.lastWaterAt || 0;
          if (now - last < WATER_COOLDOWN_MS) return false;

          cell.lastWaterAt = now;
          cell.plantedAt -= WATER_REDUCE_MS; // 남은 시간을 1초 단축(심은 시간을 1초 앞당김)

          const req = cellEffectiveGrowthRequiredMs(cell, r, c);
          if (now - cell.plantedAt >= req) {
            cell.isReady = true;
            if (isMutationCropType(cell.type)) cell.matureAt = now;
          }

          waterShake = { r: r, c: c, until: now + 200 };
          startWaterCdUi(clientX || 0, clientY || 0);
          renderGrid();
          return true;
        }

        /**
         * @param {number} r
         * @param {number} c
         */
        /**
         * @param {GridCell} cell
         * @param {number} r
         * @param {number} c
         */
        function cellEffectiveGrowthRequiredMs(cell, r, c) {
          if (cell.type === null || cell.plantedAt == null)
            return growthTimeMsForCellType("circle");
          const base = growthTimeMsForCellType(cell.type);
          const buffs = cellBuffsFor(r, c);
          const totalReduction = buffs.reduce(function (acc, b) {
            if (b.kind !== "growth_reduction") return acc;
            return acc + (b.reduction || 0);
          }, 0);
          const mult = Math.max(0.1, 1 - totalReduction);
          return Math.round(base * mult);
        }

        /** @param {GridCell} cell */
        function shapeMarkupForCell(cell) {
          const type = cell.type;
          if (!type) return "";
          const m = SHAPE_META[type];

          if (type === "arrow") {
            // 기본 도형(shape-arrow)은 "위"를 바라보는 형태(0deg)로 그려짐
            const rot =

        function cellRemainingGrowthMs(cell, r, c) {
          if (cell.type === null || cell.isReady) return 0;
          if (cell.plantedAt == null) {
            return Math.max(0, cellEffectiveGrowthRequiredMs(cell, r, c));
          }
          const req = cellEffectiveGrowthRequiredMs(cell, r, c);
          return Math.max(0, cell.plantedAt + req - Date.now());
        }

        function formatDurationMs(ms) {

        function buildAdditionalSeedProbabilityTableHtml(plantedType) {
          const rows = bonusSeedTableRowsForPlanted(plantedType);

          const basePct = isMutationCropType(plantedType)

          const baseBlock =

            return baseBlock + extraBase + "</div>";

          const baseBlockClosed = baseBlock + "</div>";
          const body = rows
            .map(function (row) {
              const disc = isBonusSeedDiscovered(row.key);
              const icon = disc ? miniBonusSeedIconHtml(row.key) : mysterySeedSlotHtml();
              const nameLabel = disc ? row.label : "???";

        function bindCellTooltip(cellEl, r, c) {
          function refreshCellTooltip() {
            if (!cellTooltipHover) return;
            const cell = GridState.getCell(cellTooltipHover.r, cellTooltipHover.c);
            if (cell.type === null) {
              const html = tooltipHtmlForBuffOnly(cellTooltipHover.r, cellTooltipHover.c);
              if (!html) {
                hideTooltip();
                return;
              }
              showTooltip(cellTooltipPointer.x, cellTooltipPointer.y, html);
              return;
            }
            showTooltip(
              cellTooltipPointer.x,
              cellTooltipPointer.y,
              tooltipHtmlForCell(cell, cellTooltipHover.r, cellTooltipHover.c)
            );
          }

          cellEl.addEventListener("mouseenter", function (e) {
            const cell = GridState.getCell(r, c);
            cellTooltipPointer.x = e.clientX;
            cellTooltipPointer.y = e.clientY;
            cellTooltipHover = { r: r, c: c };
            tooltipTarget = "cell";
            if (cellTooltipTick !== null) clearInterval(cellTooltipTick);
            cellTooltipTick = setInterval(refreshCellTooltip, 100);
            if (cell.type === null) {
              const html = tooltipHtmlForBuffOnly(r, c);
              if (!html) {
                hideTooltip();
                return;
              }
              showTooltip(e.clientX, e.clientY, html);
              return;
            }
            showTooltip(e.clientX, e.clientY, tooltipHtmlForCell(cell, r, c));
          });
          cellEl.addEventListener("mousemove", function (e) {
            const cell = GridState.getCell(r, c);
            cellTooltipPointer.x = e.clientX;
            cellTooltipPointer.y = e.clientY;
            if (cell.type === null) {
              const html = tooltipHtmlForBuffOnly(r, c);
              if (!html) {
                hideTooltip();
                return;
              }
              showTooltip(e.clientX, e.clientY, html);
              return;
            }
            showTooltip(e.clientX, e.clientY, tooltipHtmlForCell(cell, r, c));
          });
          cellEl.addEventListener("mouseleave", hideTooltip);
        }

        /** 클릭한 셀 오른쪽(공간 부족 시 왼쪽)에 패널 배치 */
        function positionPlantPanel(cellEl) {
          const panel = document.getElementById("plant-select-panel");
          if (!panel || !cellEl) return;
          const rect = cellEl.getBoundingClientRect();
          const gap = 8;
          const margin = 8;
          const pw = panel.offsetWidth || 260;
          const ph = panel.offsetHeight || 200;
          let left = rect.right + gap;
          let top = rect.top;
          if (left + pw > window.innerWidth - margin) {
            left = rect.left - gap - pw;
          }
          if (left < margin) left = margin;
          if (top + ph > window.innerHeight - margin) {
            top = Math.max(margin, window.innerHeight - ph - margin);
          }
          if (top < margin) top = margin;
          panel.style.left = left + "px";
          panel.style.top = top + "px";
        }

        function openPlantSelectUI(row, col, cellEl) {
          plantSelectTarget = { row: row, col: col };
          const panel = document.getElementById("plant-select-panel");
          const container = document.getElementById("plant-select-buttons");
          if (!panel || !container) return;
          container.innerHTML = "";

          const available = PLANTABLE_KEYS.filter(function (key) {
            return (
              (playerInventory[key] || 0) > 0 && isBonusSeedDiscovered(key)
            );
          });

          if (available.length === 0) {
            container.innerHTML =
              '<div class="rounded-lg border border-white/10 px-2 py-1.5 text-center text-xs text-white/45">없음</div>';
          } else {
            available.forEach(function (seedKey) {
              const btn = document.createElement("button");
              btn.type = "button";
              btn.className =
                "flex w-full items-center justify-between gap-2 rounded-lg border border-white/15 bg-black/50 px-2.5 py-2 text-left text-sm text-white shadow-sm ring-1 ring-white/5 transition hover:border-white/30 hover:bg-white/10";
              btn.innerHTML =
                '<span class="' +
                plantSelectSeedLabelClass(seedKey) +
                '">' +
                seedLabelKo(seedKey) +
                '</span><span class="font-mono text-xs tabular-nums text-white/85">' +
                playerInventory[seedKey] +
                "</span>";
              btn.addEventListener("click", function () {
                confirmPlantFromInventory(seedKey);
              });
              container.appendChild(btn);
            });
          }

          panel.classList.remove("hidden");
          requestAnimationFrame(function () {
            positionPlantPanel(cellEl);
          });
        }

        function confirmPlantFromInventory(seedKey) {
          if (!plantSelectTarget) return;
          if ((playerInventory[seedKey] || 0) < 1) return;
          const spec = plantSpecFromSeedKey(seedKey);
          if (!spec) return;
          const r = plantSelectTarget.row;
          const c = plantSelectTarget.col;
          const data = GridState.getCell(r, c);
          if (data.type !== null) {
            closePlantSelectUI();
            return;
          }
          playerInventory[seedKey] -= 1;
          function randomArrowDir() {
            const dirs = ["up", "right", "down", "left"];
            return dirs[Math.floor(Math.random() * dirs.length)] || "up";
          }
          const dir = seedKey === "arrow" ? randomArrowDir() : null;
          GridState.updateCell(r, c, {
            type: spec.type,
            growthTime: growthTimeMsForCellType(spec.type),
            isReady: false,
            plantedAt: Date.now(),
            lastWaterAt: 0,
            matureAt: null,
            dir: dir,
          });
          renderInventory();
          renderCodex();
          closePlantSelectUI();
        }

        function collectScatterItem(hitEl) {
          const grant = hitEl.dataset.invGrant || hitEl.dataset.shapeType;
          const okGrant =
            grant &&
            SHAPE_TYPES.includes(grant);
          if (!okGrant) return;
          if (hitEl.dataset.collected === "1") return;
          if (hitEl.dataset.scatterAnimating === "1") return;
          hitEl.dataset.collected = "1";
          playerInventory[grant] += 1;
          cumulativeHarvest[grant] += 1;
          const wrap = hitEl.closest(".scatter-item-wrap");
          if (wrap) wrap.remove();
          else hitEl.remove();
          hideTooltip();
          renderInventory();
          console.log("[수집]", {
            grant: grant,
            인벤토리: { ...playerInventory },
          });
        }

        /** 수확 셀 중심 기준 ±0.6 그리드 이내 랜덤 (최종 착지, 중력 없음) */
        function randomGridOffsetFromHarvest() {
          return Math.random() * 1.2 - 0.6;
        }

        /** 2차 베지어 포물선 상의 점 (P1은 중점 위로 당겨 포물선 느낌) */
        function quadBezierPoint(P0, P1, P2, t) {
          const u = 1 - t;
          return {
            x: u * u * P0.x + 2 * u * t * P1.x + t * t * P2.x,
            y: u * u * P0.y + 2 * u * t * P1.y + t * t * P2.y,
          };
        }

        function scatterGrantAriaLabel(invGrant) {
          return SHAPE_META[invGrant].name + " — 도형 위에 올리면 수집";
        }

        /**
         * @param {string} shapeType 그리드/애니메이션용 도형
         * @param {number} fromRow
         * @param {number} fromCol
         * @param {string} [invGrantOpt] 인벤 반영 키 (미지정 시 shapeType)
         */
        function spawnScatteredHarvestItem(shapeType, fromRow, fromCol, invGrantOpt) {
          const invGrant = invGrantOpt || shapeType;
          const layer = document.getElementById("grid-scatter-layer");
          if (!layer) return;
          const ox = randomGridOffsetFromHarvest();
          const oy = randomGridOffsetFromHarvest();
          let gx = fromCol + 0.5 + ox;
          let gy = fromRow + 0.5 + oy;
          gx = Math.max(0, Math.min(gridSize, gx));
          gy = Math.max(0, Math.min(gridSize, gy));

          const wrap = document.createElement("div");
          wrap.className =
            "scatter-item-wrap absolute z-[6] flex items-center justify-center pointer-events-none";
          wrap.style.left = (gx / gridSize) * 100 + "%";
          wrap.style.top = (gy / gridSize) * 100 + "%";
          wrap.style.transform = "translate(-50%, -50%)";

          const hitZone = document.createElement("div");
          hitZone.className =
            "scatter-hit flex items-center justify-center rounded-md p-1 pointer-events-auto";
          hitZone.dataset.shapeType = shapeType;
          hitZone.dataset.invGrant = invGrant;
          hitZone.dataset.scatterAnimating = "1";
          hitZone.setAttribute("role", "presentation");

          const inner = document.createElement("div");
          inner.className = scatterInnerClass(shapeType, invGrant);
          inner.setAttribute("aria-hidden", "true");
          hitZone.appendChild(inner);
          wrap.appendChild(hitZone);
          layer.appendChild(wrap);

          const lw = layer.offsetWidth || gridSize * CELL_PX;
          const lh = layer.offsetHeight || gridSize * CELL_PX;
          const pixelFX = (gx / gridSize) * lw;
          const pixelFY = (gy / gridSize) * lh;
          const pixelSX = ((fromCol + 0.5) / gridSize) * lw;
          const pixelSY = ((fromRow + 0.5) / gridSize) * lh;
          const offX = pixelSX - pixelFX;
          const offY = pixelSY - pixelFY;

          const P0 = { x: offX, y: offY };
          const P2 = { x: 0, y: 0 };
          const mid = { x: (P0.x + P2.x) / 2, y: (P0.y + P2.y) / 2 };
          const lift = -Math.min(
            52,
            16 + Math.hypot(offX, offY) * 0.14
          );
          const P1 = { x: mid.x, y: mid.y + lift };

          const steps = 14;
          const frames = [];
          for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            const p = quadBezierPoint(P0, P1, P2, t);
            frames.push({
              transform: "translate(" + p.x + "px, " + p.y + "px)",
            });
          }

          const anim = inner.animate(frames, {
            duration: 450,
            easing: "linear",
            fill: "forwards",
          });

          anim.finished.then(function () {
            hitZone.dataset.scatterAnimating = "0";
            hitZone.style.pointerEvents = "auto";
            hitZone.style.cursor = "default";
            hitZone.setAttribute("aria-label", scatterGrantAriaLabel(invGrant));

            hitZone.addEventListener("mousemove", function (e) {
              if (hitZone.dataset.collected === "1") return;
              showTooltip(
                e.clientX,
                e.clientY,
                tooltipHtmlForScatter(invGrant)
              );
            });
            hitZone.addEventListener("mouseleave", hideTooltip);
            hitZone.addEventListener("mouseenter", function onCollect() {
              if (
                hitZone.dataset.collected === "1" ||
                hitZone.dataset.scatterAnimating === "1"
              )
                return;
              collectScatterItem(hitZone);
            });
          }).catch(function () {});
        }

        function renderGrid() {
          for (let r = 0; r < gridSize; r++) {
            for (let c = 0; c < gridSize; c++) {
              const el = cellElements[r][c];
              if (!el) continue;
              const cell = GridState.cells[r][c];
              const { type, isReady } = cell;
              el.innerHTML = shapeMarkupForCell(cell);
              const showReadyHighlight = type !== null && isReady;
              const buffs = cellBuffsFor(r, c);
              const blueCount = buffs.filter(function (b) {
                return b.kind === "growth_reduction";
              }).length;
              const greenCount = buffs.filter(function (b) {
                return b.kind === "bonus_double";
              }).length;
              const total = blueCount + greenCount;
              let extra = "";
              if (showReadyHighlight) extra += " " + CELL_READY_CLASS;
              if (total > 0) {
                extra += " buff-ring";
                const bluePct = Math.round((blueCount / total) * 1000) / 10;
                el.style.setProperty("--buff-blue-pct", bluePct + "%");
              } else {
                el.style.removeProperty("--buff-blue-pct");
              }
              el.className = cellClass + extra;
              el.dataset.ready = showReadyHighlight ? "true" : "false";
              el.dataset.greenNeighborAura = "false";
            }
          }
        }

        function tickGrowth() {
          const now = Date.now();
          let changed = false;
          for (let r = 0; r < gridSize; r++) {
            for (let c = 0; c < gridSize; c++) {
              const cell = GridState.cells[r][c];
              if (cell.type === null) continue;

              // 변이 작물: 성장 완료 후 수명 처리
              if (isMutationCropType(cell.type) && cell.isReady && cell.matureAt != null) {
                const life = mutationLifespanMs(cell.type);
                if (life != null && now - cell.matureAt >= life) {
                  if (Math.random() < 0.5) {
                    spawnScatteredHarvestItem(cell.type, r, c);
                  }
                  if (
                    (cell.type === "rect_h" || cell.type === "rect_v") &&
                    Math.random() < 0.15
                  ) {
                    spawnScatteredHarvestItem("cross", r, c);
                  }
                  Object.assign(cell, createEmptyCell());
                  changed = true;
                }
                continue;
              }

              if (cell.isReady) continue;
              if (cell.plantedAt == null) continue;
              const req = cellEffectiveGrowthRequiredMs(cell, r, c);
              if (now - cell.plantedAt >= req) {
                cell.isReady = true;
                if (isMutationCropType(cell.type)) cell.matureAt = now;
                changed = true;
              }
            }
          }
          if (changed) renderGrid();
        }

        const grid = document.getElementById("game-grid");
        const sample = document.getElementById("cell-class-sample");
        if (!grid || !sample) return;

        const cellClass = sample.className;

        let inventoryCollapsed = false;
        let codexCollapsed = false;

        const ICON_CHEVRON_LEFT =
          '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="pointer-events-none h-5 w-5" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>';
        const ICON_CHEVRON_RIGHT =
          '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="pointer-events-none h-5 w-5" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>';

        function applySidebarPanels() {
          const invAside = document.getElementById("inventory-aside");
          const invContent = document.getElementById("inventory-content");
          const invBtn = document.getElementById("inventory-toggle");
          const codexAside = document.getElementById("codex-aside");
          const codexContent = document.getElementById("codex-content");
          const codexBtn = document.getElementById("codex-toggle");
          if (!invAside || !invContent || !invBtn || !codexAside || !codexContent || !codexBtn)
            return;

          invBtn.innerHTML = inventoryCollapsed ? ICON_CHEVRON_RIGHT : ICON_CHEVRON_LEFT;
          invBtn.setAttribute("aria-expanded", String(!inventoryCollapsed));
          invBtn.setAttribute(
            "aria-label",
            inventoryCollapsed ? "인벤토리 펼치기" : "인벤토리 접기"
          );
          invContent.classList.toggle("lg:hidden", inventoryCollapsed);
          invAside.classList.toggle("lg:w-72", !inventoryCollapsed);
          invAside.classList.toggle("lg:w-14", inventoryCollapsed);
          invAside.classList.toggle("lg:p-4", !inventoryCollapsed);
          invAside.classList.toggle("lg:p-2", inventoryCollapsed);

          codexBtn.innerHTML = codexCollapsed ? ICON_CHEVRON_LEFT : ICON_CHEVRON_RIGHT;
          codexBtn.setAttribute("aria-expanded", String(!codexCollapsed));
          codexBtn.setAttribute(
            "aria-label",
            codexCollapsed ? "도감 펼치기" : "도감 접기"
          );
          codexContent.classList.toggle("lg:hidden", codexCollapsed);
          codexAside.classList.toggle("lg:w-80", !codexCollapsed);
          codexAside.classList.toggle("lg:w-14", codexCollapsed);
          codexAside.classList.toggle("lg:p-4", !codexCollapsed);
          codexAside.classList.toggle("lg:p-2", codexCollapsed);
        }

        document.getElementById("inventory-toggle")?.addEventListener("click", function () {
          inventoryCollapsed = !inventoryCollapsed;
          applySidebarPanels();
        });
        document.getElementById("codex-toggle")?.addEventListener("click", function () {
          codexCollapsed = !codexCollapsed;
          applySidebarPanels();
        });
        applySidebarPanels();

        initCodexExpand();
        initGridUpgradeCostTooltips();

        function updateGridUpgradeUi() {
          const btn = document.getElementById("grid-upgrade-btn");
          const detail = document.getElementById("grid-upgrade-detail");
          if (!btn || !detail) return;
          if (gridSize >= GRID_MAX_SIZE) {
            btn.disabled = true;
            btn.textContent = "밭 최대";
            detail.innerHTML = "";
            return;
          }
          const nextSide = gridSize + 1;
          btn.textContent = "밭 확장";
          btn.disabled = !canAffordGridExpand(nextSide);
          detail.innerHTML = gridExpandCostHtml(nextSide);
        }

        function buildGridDom() {
          const fieldWrap = document.getElementById("field-wrap");
          const scatterLayer = document.getElementById("grid-scatter-layer");
          if (!grid || !fieldWrap) return;
          grid.innerHTML = "";
          if (scatterLayer) scatterLayer.innerHTML = "";
          grid.className =
            "relative z-0 grid gap-0 border-t border-l border-gray-600 " +
            GRID_COL_CLASS[gridSize] +
            " " +
            GRID_ROW_CLASS[gridSize];
          grid.setAttribute("aria-label", gridSize + "×" + gridSize + " 게임 그리드");
          const px = gridSize * CELL_PX;
          fieldWrap.style.width = px + "px";
          fieldWrap.style.height = px + "px";

          cellElements = [];
          for (let row = 0; row < gridSize; row++) {
            cellElements[row] = [];
            for (let col = 0; col < gridSize; col++) {
              const index = row * gridSize + col;
              const cell = document.createElement("div");
              cell.className = cellClass;
              cell.dataset.index = String(index);
              cell.dataset.row = String(row);
              cell.dataset.col = String(col);
              cellElements[row][col] = cell;
              bindCellTooltip(cell, row, col);
              cell.addEventListener("click", function handleCellClick(e) {
                const r = Number(cell.dataset.row);
                const c = Number(cell.dataset.col);
                const data = GridState.getCell(r, c);

                if (data.type === null) {
                  e.stopPropagation();
                  openPlantSelectUI(r, c, cell);
                  return;
                }

                if (!data.isReady) {
                  tryWaterCell(r, c, e.clientX, e.clientY);
                  return;
                }

                // 변이작물: 성장 완료 후(수명 내) 클릭하면 아무것도 안 주고 사라짐
                if (isMutationCropType(data.type)) {
                  GridState.updateCell(r, c, {
                    type: null,
                    growthTime: 0,
                    isReady: false,
                    plantedAt: null,
                    lastWaterAt: 0,
                    matureAt: null,
                  });
                  return;
                }

                const harvested = data.type;
                GridState.updateCell(r, c, {
                  type: null,
                  growthTime: 0,
                  isReady: false,
                  plantedAt: null,
                  lastWaterAt: 0,
                  matureAt: null,
                });
                // 화살표 버프: 이 칸이 영향 받으면 "추가획득" 씨앗만 20% 확률로 2배
                const buffs = cellBuffsFor(r, c);
                const hasArrowBuff = buffs.some(function (b) {
                  return b.kind === "bonus_double" && b.sourceType === "arrow";
                });
                harvestDropsFor(harvested).forEach(function (k, idx) {
                  spawnScatteredHarvestItem(k, r, c);
                  // 자기 씨앗(기본 획득)에는 적용하지 않고, 추가획득만 적용
                  if (hasArrowBuff && k !== harvested && Math.random() < 0.2) {
                    spawnScatteredHarvestItem(k, r, c);
                  }
                });
              });
              grid.appendChild(cell);
            }
          }
        }

        function applyGridExpansion() {
          if (gridSize >= GRID_MAX_SIZE) return;
          const nextSide = gridSize + 1;
          if (!canAffordGridExpand(nextSide)) return;
          payGridExpandCost(nextSide);
          const oldCells = GridState.cells;
          const oldN = gridSize;
          gridSize = nextSide;
          const newCells = [];
          for (let r = 0; r < gridSize; r++) {
            newCells[r] = [];
            for (let c = 0; c < gridSize; c++) {
              if (r < oldN && c < oldN) {
                newCells[r][c] = Object.assign({}, oldCells[r][c]);
              } else {
                newCells[r][c] = createEmptyCell();
              }
            }
          }
          GridState.cells = newCells;
          closePlantSelectUI();
          buildGridDom();
          renderGrid();
          renderInventory();
        }

        document.getElementById("grid-upgrade-btn")?.addEventListener("click", function () {
          applyGridExpansion();
        });

        buildGridDom();
        updateGridUpgradeUi();

        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") closePlantSelectUI();
        });

        document.addEventListener("click", function (e) {
          const panel = document.getElementById("plant-select-panel");
          if (!panel || panel.classList.contains("hidden")) return;
          if (panel.contains(e.target)) return;
          closePlantSelectUI();
        });

        renderGrid();
        renderInventory();
        renderCodex();

        const GROWTH_TICK_MS = 250;
        setInterval(tickGrowth, GROWTH_TICK_MS);

        window.GridState = GridState;
        window.playerInventory = playerInventory;
        window.GRID_EXPAND_COST = GRID_EXPAND_COST;

        console.log("게임 그리드 준비됨:", grid.children.length, "셀");
      })();
    </script>
  </body>
</html>
