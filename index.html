    <script>
      (function () {
        /**
         * @typedef {null | "circle" | "square" | "triangle"} CellType
         * @typedef {null | "circle_green" | "circle_gold" | "square_gold" | "triangle_green"} CellVariant
         * @typedef {{ type: CellType, variant: CellVariant, growthTime: number, isReady: boolean, plantedAt: number | null, matureAt: number | null }} GridCell
         */

        /** @type {CellType[]} */
        const SHAPE_TYPES = ["circle", "square", "triangle"];

        const CELL_PX = 60;
        const GRID_MAX_SIZE = 5;
        /** @type {number} 현재 한 변 칸 수 */
        let gridSize = 2;

        /** 밭 확장 비용에 쓰이는 씨앗 키 순서 (기본 + 변이) */
        const GRID_EXPAND_COST_KEYS = [
          "circle",
          "square",
          "triangle",
          "circle_green",
          "circle_gold",
          "square_gold",
          "triangle_green",
        ];

        /**
         * 확장 후 목표 한 변 칸 수(3~5)별 비용. 3 = 2×2→3×3, 4 = 3×3→4×4, 5 = 4×4→5×5
         * @type {Record<number, Record<string, number>>}
         */
        const GRID_EXPAND_COST = {
          3: {
            circle: 2,
            square: 1,
            triangle: 0,
            circle_green: 1,
            circle_gold: 0,
            square_gold: 0,
            triangle_green: 0,
          },
          4: {
            circle: 3,
            square: 2,
            triangle: 2,
            circle_green: 1,
            circle_gold: 1,
            square_gold: 0,
            triangle_green: 1,
          },
          5: {
            circle: 5,
            square: 4,
            triangle: 3,
            circle_green: 2,
            circle_gold: 1,
            square_gold: 1,
            triangle_green: 1,
          },
        };

        const GRID_COL_CLASS = [
          "",
          "",
          "grid-cols-2",
          "grid-cols-3",
          "grid-cols-4",
          "grid-cols-5",
        ];
        const GRID_ROW_CLASS = [
          "",
          "",
          "grid-rows-2",
          "grid-rows-3",
          "grid-rows-4",
          "grid-rows-5",
        ];

        /** 도형별 표시명·설명 (색상은 모두 흰색 통일) */
        const SHAPE_META = {
          circle: {
            id: "circle",
            name: "원",
            nameEn: "Circle",
            fillClass: "bg-white",
            hex: "#ffffff",
          },
          square: {
            id: "square",
            name: "사각형",
            nameEn: "Square",
            fillClass: "bg-white",
            hex: "#ffffff",
          },
          triangle: {
            id: "triangle",
            name: "삼각형",
            nameEn: "Triangle",
            fillClass: "bg-white",
            hex: "#ffffff",
          },
        };

        /** 성장 완료 시 셀 (모든 도형 동일 흰색 강조) */
        const CELL_READY_CLASS =
          "ring-2 ring-white/80 shadow-[0_0_14px_rgba(255,255,255,0.45)] border-r border-b border-white/50 z-[1] relative";

        /** 활성 원:초록 상·하·좌·우 인접 칸 — 연한 초록 태두리(성장 완료 링과 동시에 쓰기 위해 inset shadow) */
        const CELL_GREEN_AURA_NEIGHBOR_BORDER =
          "shadow-[inset_0_0_0_2px_rgba(52,211,153,0.55)]";

        /** @returns {GridCell} */
        function createEmptyCell() {
          return {
            type: null,
            variant: null,
            growthTime: 0,
            isReady: false,
            plantedAt: null,
            matureAt: null,
          };
        }

        function createGridData() {
          return Array.from({ length: gridSize }, () =>
            Array.from({ length: gridSize }, () => createEmptyCell())
          );
        }

        /** 변이 작물(심은 뒤) 필드 유지 시간 — 만료 시 보너스/기본 씨앗 드롭 */
        const VARIANT_LIFESPAN_MS = 90_000;

        /**
         * @param {CellType} type
         * @returns {number}
         */
        function growthTimeMsForCellType(type) {
          if (type === "circle") return 20_000;
          if (type === "square") return 30_000;
          if (type === "triangle") return 40_000;
          return 20_000;
        }

        /** @returns {number} 3 이상 5 이하 */
        function randomInt3To5() {
          return 3 + Math.floor(Math.random() * 3);
        }

        /** 심을 수 있는 씨앗 키 (기본 3종 + 변이) */
        const PLANTABLE_KEYS = [
          "circle",
          "square",
          "triangle",
          "circle_green",
          "circle_gold",
          "square_gold",
          "triangle_green",
        ];

        /** @param {string} seedKey */
        function plantSpecFromSeedKey(seedKey) {
          if (seedKey === "circle_green")
            return { type: "circle", variant: "circle_green" };
          if (seedKey === "circle_gold")
            return { type: "circle", variant: "circle_gold" };
          if (seedKey === "square_gold")
            return { type: "square", variant: "square_gold" };
          if (seedKey === "triangle_green")
            return { type: "triangle", variant: "triangle_green" };
          if (SHAPE_TYPES.includes(seedKey))
            return { type: seedKey, variant: null };
          return null;
        }

        /**
         * @param {string} seedKey
         */
        function seedLabelKo(seedKey) {
          if (seedKey === "circle_green") return "원:초록";
          if (seedKey === "circle_gold") return "원:황금";
          if (seedKey === "square_gold") return "사각형:황금";
          if (seedKey === "triangle_green") return "삼각형:초록";
          const m = SHAPE_META[seedKey];
          return m ? m.name : seedKey;
        }

        /** 빈 칸 심기 패널: 변이 씨앗 이름 글씨색(도형 색과 대응) */
        function plantSelectSeedLabelClass(seedKey) {
          if (seedKey === "circle_green") return "font-medium text-emerald-400";
          if (seedKey === "circle_gold" || seedKey === "square_gold")
            return "font-medium text-amber-300";
          if (seedKey === "triangle_green") return "font-medium text-emerald-400";

         * @param {number} r
         * @param {number} c
         */
        function neighborGrowthMultiplierFor(r, c) {
          const dirs = [
            [-1, 0],
            [1, 0],
            [0, -1],
            [0, 1],
          ];
          let nCircleGreen = 0;
          let nTriangleGreen = 0;
          for (let i = 0; i < dirs.length; i++) {
            const nr = r + dirs[i][0];
            const nc = c + dirs[i][1];
            if (nr < 0 || nr >= gridSize || nc < 0 || nc >= gridSize) continue;
            const adj = GridState.cells[nr][nc];

            if (adj.type === "circle" && adj.variant === "circle_green") nCircleGreen += 1;

            const detail = card.querySelector("[data-codex-detail]");
            const chev = btn.querySelector("[data-codex-chevron]");
            const expanded = btn.getAttribute("aria-expanded") === "true";
            const next = !expanded;

            if (detail) detail.classList.toggle("hidden", !next);
            if (chev) chev.classList.toggle("rotate-180", next);
          });

        function bindCellTooltip(cellEl, r, c) {
          function refreshCellTooltip() {
            if (!cellTooltipHover) return;
            const cell = GridState.getCell(cellTooltipHover.r, cellTooltipHover.c);
            if (cell.type === null) {
              hideTooltip();
              return;
            }
            showTooltip(
              cellTooltipPointer.x,
              cellTooltipPointer.y,
              tooltipHtmlForCell(cell, cellTooltipHover.r, cellTooltipHover.c)
            );
          }

          cellEl.addEventListener("mouseenter", function (e) {
            const cell = GridState.getCell(r, c);
            if (cell.type === null) {
              hideTooltip();
              return;
            }
            cellTooltipPointer.x = e.clientX;
            cellTooltipPointer.y = e.clientY;
            cellTooltipHover = { r: r, c: c };
            tooltipTarget = "cell";
            if (cellTooltipTick !== null) clearInterval(cellTooltipTick);
            cellTooltipTick = setInterval(refreshCellTooltip, 100);
            showTooltip(e.clientX, e.clientY, tooltipHtmlForCell(cell, r, c));
          });
          cellEl.addEventListener("mousemove", function (e) {
            const cell = GridState.getCell(r, c);
            if (cell.type === null) {
              hideTooltip();
              return;
            }
            cellTooltipPointer.x = e.clientX;
            cellTooltipPointer.y = e.clientY;
            showTooltip(e.clientX, e.clientY, tooltipHtmlForCell(cell, r, c));
          });
          cellEl.addEventListener("mouseleave", hideTooltip);
        }

          detail.addEventListener("mouseover", function (e) {

        function closePlantSelectUI() {
          plantSelectTarget = null;

        /** 클릭한 셀 오른쪽(공간 부족 시 왼쪽)에 패널 배치 */
        function positionPlantPanel(cellEl) {
          const panel = document.getElementById("plant-select-panel");
          if (!panel || !cellEl) return;
          const rect = cellEl.getBoundingClientRect();
          const gap = 8;
          const margin = 8;
          const pw = panel.offsetWidth || 260;
          const ph = panel.offsetHeight || 200;
          let left = rect.right + gap;
          let top = rect.top;
          if (left + pw > window.innerWidth - margin) {
            left = rect.left - gap - pw;
          }
          if (left < margin) left = margin;
          if (top + ph > window.innerHeight - margin) {
            top = Math.max(margin, window.innerHeight - ph - margin);
          }
          if (top < margin) top = margin;
          panel.style.left = left + "px";
          panel.style.top = top + "px";
        }

        function openPlantSelectUI(row, col, cellEl) {
          plantSelectTarget = { row: row, col: col };
          const panel = document.getElementById("plant-select-panel");
          const container = document.getElementById("plant-select-buttons");
          if (!panel || !container) return;
          container.innerHTML = "";

          const available = PLANTABLE_KEYS.filter(function (key) {
            return (
              (playerInventory[key] || 0) > 0 && isBonusSeedDiscovered(key)
            );
          });

          if (available.length === 0) {
            container.innerHTML =
              '<div class="rounded-lg border border-white/10 px-2 py-1.5 text-center text-xs text-white/45">없음</div>';
          } else {
            available.forEach(function (seedKey) {
              const btn = document.createElement("button");
              btn.type = "button";
              btn.className =
                "flex w-full items-center justify-between gap-2 rounded-lg border border-white/15 bg-black/50 px-2.5 py-2 text-left text-sm text-white shadow-sm ring-1 ring-white/5 transition hover:border-white/30 hover:bg-white/10";
              btn.innerHTML =
                '<span class="' +
                plantSelectSeedLabelClass(seedKey) +
                '">' +
                seedLabelKo(seedKey) +
                '</span><span class="font-mono text-xs tabular-nums text-white/85">' +
                playerInventory[seedKey] +
                "</span>";
              btn.addEventListener("click", function () {
                confirmPlantFromInventory(seedKey);
              });
              container.appendChild(btn);
            });
          }

          panel.classList.remove("hidden");
          requestAnimationFrame(function () {
            positionPlantPanel(cellEl);
          });
        }

        function confirmPlantFromInventory(seedKey) {
          if (!plantSelectTarget) return;
          if ((playerInventory[seedKey] || 0) < 1) return;
          const spec = plantSpecFromSeedKey(seedKey);
          if (!spec) return;
          const r = plantSelectTarget.row;
          const c = plantSelectTarget.col;
          const data = GridState.getCell(r, c);
          if (data.type !== null) {
            closePlantSelectUI();
            return;
          }
          playerInventory[seedKey] -= 1;
          GridState.updateCell(r, c, {
            type: spec.type,
            variant: spec.variant,
            growthTime: growthTimeMsForCellType(spec.type),
            isReady: false,
            plantedAt: Date.now(),
            matureAt: null,
          });
          renderInventory();
          renderCodex();
          closePlantSelectUI();
        }

        function collectScatterItem(hitEl) {
          const grant = hitEl.dataset.invGrant || hitEl.dataset.shapeType;
          const okGrant =
            grant &&
            (SHAPE_TYPES.includes(grant) ||
              grant === "circle_green" ||
              grant === "circle_gold" ||
              grant === "square_gold" ||
              grant === "triangle_green");
          if (!okGrant) return;
          if (hitEl.dataset.collected === "1") return;
          if (hitEl.dataset.scatterAnimating === "1") return;
          hitEl.dataset.collected = "1";
          if (grant === "circle_green") {
            playerInventory.circle_green += 1;
            cumulativeHarvest.circle_green += 1;
          } else if (grant === "circle_gold") {
            playerInventory.circle_gold += 1;
            cumulativeHarvest.circle_gold += 1;
          } else if (grant === "square_gold") {
            playerInventory.square_gold += 1;
            cumulativeHarvest.square_gold += 1;
          } else if (grant === "triangle_green") {
            playerInventory.triangle_green += 1;
            cumulativeHarvest.triangle_green += 1;
          } else {
            playerInventory[grant] += 1;
            cumulativeHarvest[grant] += 1;
          }
          const wrap = hitEl.closest(".scatter-item-wrap");
          if (wrap) wrap.remove();
          else hitEl.remove();
          hideTooltip();
          renderInventory();
          console.log("[수집]", {
            grant: grant,
            인벤토리: { ...playerInventory },
          });
        }

        /** 수확 셀 중심 기준 ±0.6 그리드 이내 랜덤 (최종 착지, 중력 없음) */
        function randomGridOffsetFromHarvest() {
          return Math.random() * 1.2 - 0.6;
        }

        /** 2차 베지어 포물선 상의 점 (P1은 중점 위로 당겨 포물선 느낌) */
        function quadBezierPoint(P0, P1, P2, t) {
          const u = 1 - t;
          return {
            x: u * u * P0.x + 2 * u * t * P1.x + t * t * P2.x,
            y: u * u * P0.y + 2 * u * t * P1.y + t * t * P2.y,
          };
        }

        function scatterGrantAriaLabel(invGrant) {
          if (invGrant === "circle_green") return "원:초록 — 도형 위에 올리면 수집";
          if (invGrant === "circle_gold") return "원:황금 — 도형 위에 올리면 수집";
          if (invGrant === "square_gold") return "사각형:황금 — 도형 위에 올리면 수집";
          if (invGrant === "triangle_green") return "삼각형:초록 — 도형 위에 올리면 수집";
          return SHAPE_META[invGrant].name + " — 도형 위에 올리면 수집";
        }

        /**
         * @param {string} shapeType 그리드/애니메이션용 도형
         * @param {number} fromRow
         * @param {number} fromCol
         * @param {string} [invGrantOpt] 인벤 반영 키 (미지정 시 shapeType)
         */
        function spawnScatteredHarvestItem(shapeType, fromRow, fromCol, invGrantOpt) {
          const invGrant = invGrantOpt || shapeType;
          const layer = document.getElementById("grid-scatter-layer");
          if (!layer) return;
          const ox = randomGridOffsetFromHarvest();
          const oy = randomGridOffsetFromHarvest();
          let gx = fromCol + 0.5 + ox;
          let gy = fromRow + 0.5 + oy;
          gx = Math.max(0, Math.min(gridSize, gx));
          gy = Math.max(0, Math.min(gridSize, gy));

          const wrap = document.createElement("div");
          wrap.className =
            "scatter-item-wrap absolute z-[6] flex items-center justify-center pointer-events-none";
          wrap.style.left = (gx / gridSize) * 100 + "%";
          wrap.style.top = (gy / gridSize) * 100 + "%";
          wrap.style.transform = "translate(-50%, -50%)";

          const hitZone = document.createElement("div");
          hitZone.className =
            "scatter-hit flex items-center justify-center p-0 pointer-events-none";
          hitZone.dataset.shapeType = shapeType;
          hitZone.dataset.invGrant = invGrant;
          hitZone.dataset.scatterAnimating = "1";
          hitZone.setAttribute("role", "presentation");

          const inner = document.createElement("div");
          inner.className = scatterInnerClass(shapeType, invGrant);
          inner.setAttribute("aria-hidden", "true");
          hitZone.appendChild(inner);
          wrap.appendChild(hitZone);
          layer.appendChild(wrap);

          const lw = layer.offsetWidth || gridSize * CELL_PX;
          const lh = layer.offsetHeight || gridSize * CELL_PX;
          const pixelFX = (gx / gridSize) * lw;
          const pixelFY = (gy / gridSize) * lh;
          const pixelSX = ((fromCol + 0.5) / gridSize) * lw;
          const pixelSY = ((fromRow + 0.5) / gridSize) * lh;
          const offX = pixelSX - pixelFX;
          const offY = pixelSY - pixelFY;

          const P0 = { x: offX, y: offY };
          const P2 = { x: 0, y: 0 };
          const mid = { x: (P0.x + P2.x) / 2, y: (P0.y + P2.y) / 2 };
          const lift = -Math.min(
            52,
            16 + Math.hypot(offX, offY) * 0.14
          );
          const P1 = { x: mid.x, y: mid.y + lift };

          const steps = 14;
          const frames = [];
          for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            const p = quadBezierPoint(P0, P1, P2, t);
            frames.push({
              transform: "translate(" + p.x + "px, " + p.y + "px)",
            });
          }

          const anim = inner.animate(frames, {
            duration: 450,
            easing: "linear",
            fill: "forwards",
          });

          anim.finished.then(function () {
            hitZone.dataset.scatterAnimating = "0";
            inner.style.pointerEvents = "auto";
            inner.style.cursor = "default";
            hitZone.setAttribute("aria-label", scatterGrantAriaLabel(invGrant));

            inner.addEventListener("mousemove", function (e) {
              if (hitZone.dataset.collected === "1") return;
              showTooltip(
                e.clientX,
                e.clientY,
                tooltipHtmlForScatter(invGrant)
              );
            });
            inner.addEventListener("mouseleave", hideTooltip);
            inner.addEventListener("mouseenter", function onCollect() {
              if (
                hitZone.dataset.collected === "1" ||
                hitZone.dataset.scatterAnimating === "1"
              )
                return;
              collectScatterItem(hitZone);
            });
          }).catch(function () {});
        }

        function renderGrid() {
          for (let r = 0; r < gridSize; r++) {
            for (let c = 0; c < gridSize; c++) {
              const el = cellElements[r][c];
              if (!el) continue;
              const cell = GridState.cells[r][c];
              const { type, isReady } = cell;
              el.innerHTML = shapeMarkupForCell(cell);
              const showReadyHighlight =
                type !== null && isReady && !cell.variant;
              const greenNeighbor = cellIsAdjacentToActiveGreenAura(r, c);
              let extra = "";
              if (greenNeighbor) extra += " " + CELL_GREEN_AURA_NEIGHBOR_BORDER;
              if (showReadyHighlight) extra += " " + CELL_READY_CLASS;
              el.className = cellClass + extra;
              el.dataset.ready = showReadyHighlight ? "true" : "false";
              el.dataset.greenNeighborAura = greenNeighbor ? "true" : "false";
            }
          }
        }

        function tickGrowth() {
          const now = Date.now();
          let changed = false;
          for (let r = 0; r < gridSize; r++) {
            for (let c = 0; c < gridSize; c++) {
              const cell = GridState.cells[r][c];
              if (cell.type === null) continue;

              if (cell.variant && cell.isReady && cell.matureAt != null) {
                if (now - cell.matureAt >= VARIANT_LIFESPAN_MS) {
                  if (cell.variant === "circle_gold") {
                    const n = randomInt3To5();
                    for (let i = 0; i < n; i++)
                      spawnScatteredHarvestItem("circle", r, c);
                  } else if (cell.variant === "square_gold") {
                    const n = randomInt3To5();
                    for (let i = 0; i < n; i++)
                      spawnScatteredHarvestItem("square", r, c);
                  } else {
                    spawnScatteredHarvestItem(cell.type, r, c);
                  }
                  Object.assign(cell, createEmptyCell());
                  changed = true;
                }
                continue;
              }

              if (cell.isReady) continue;
              if (cell.plantedAt == null) continue;
              const req = cellEffectiveGrowthRequiredMs(cell, r, c);
              if (now - cell.plantedAt >= req) {
                cell.isReady = true;
                if (cell.variant) cell.matureAt = now;
                changed = true;
              }
            }
          }
          if (changed) renderGrid();
        }

        const grid = document.getElementById("game-grid");
        const sample = document.getElementById("cell-class-sample");
        if (!grid || !sample) return;

        const cellClass = sample.className;

        let inventoryCollapsed = false;
        let codexCollapsed = false;

        const ICON_CHEVRON_LEFT =
          '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="pointer-events-none h-5 w-5" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>';
        const ICON_CHEVRON_RIGHT =
          '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="pointer-events-none h-5 w-5" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>';

        function applySidebarPanels() {
          const invAside = document.getElementById("inventory-aside");
          const invContent = document.getElementById("inventory-content");
          const invBtn = document.getElementById("inventory-toggle");
          const codexAside = document.getElementById("codex-aside");
          const codexContent = document.getElementById("codex-content");
          const codexBtn = document.getElementById("codex-toggle");
          if (!invAside || !invContent || !invBtn || !codexAside || !codexContent || !codexBtn)
            return;

          invBtn.innerHTML = inventoryCollapsed ? ICON_CHEVRON_RIGHT : ICON_CHEVRON_LEFT;
          invBtn.setAttribute("aria-expanded", String(!inventoryCollapsed));
          invBtn.setAttribute(
            "aria-label",
            inventoryCollapsed ? "인벤토리 펼치기" : "인벤토리 접기"
          );
          invContent.classList.toggle("lg:hidden", inventoryCollapsed);
          invAside.classList.toggle("lg:w-72", !inventoryCollapsed);
          invAside.classList.toggle("lg:w-14", inventoryCollapsed);
          invAside.classList.toggle("lg:p-4", !inventoryCollapsed);
          invAside.classList.toggle("lg:p-2", inventoryCollapsed);

          codexBtn.innerHTML = codexCollapsed ? ICON_CHEVRON_LEFT : ICON_CHEVRON_RIGHT;
          codexBtn.setAttribute("aria-expanded", String(!codexCollapsed));
          codexBtn.setAttribute(
            "aria-label",
            codexCollapsed ? "도감 펼치기" : "도감 접기"
          );
          codexContent.classList.toggle("lg:hidden", codexCollapsed);
          codexAside.classList.toggle("lg:w-80", !codexCollapsed);
          codexAside.classList.toggle("lg:w-14", codexCollapsed);
          codexAside.classList.toggle("lg:p-4", !codexCollapsed);
          codexAside.classList.toggle("lg:p-2", codexCollapsed);
        }

        document.getElementById("inventory-toggle")?.addEventListener("click", function () {
          inventoryCollapsed = !inventoryCollapsed;
          applySidebarPanels();
        });
        document.getElementById("codex-toggle")?.addEventListener("click", function () {
          codexCollapsed = !codexCollapsed;
          applySidebarPanels();
        });
        applySidebarPanels();

        initCodexExpand();
        initGridUpgradeCostTooltips();

        function updateGridUpgradeUi() {
          const btn = document.getElementById("grid-upgrade-btn");
          const detail = document.getElementById("grid-upgrade-detail");
          if (!btn || !detail) return;
          if (gridSize >= GRID_MAX_SIZE) {
            btn.disabled = true;
            btn.textContent = "밭 최대";
            detail.innerHTML = "";
            return;
          }
          const nextSide = gridSize + 1;
          btn.textContent = "밭 확장";
          btn.disabled = !canAffordGridExpand(nextSide);
          detail.innerHTML = gridExpandCostHtml(nextSide);
        }

        function buildGridDom() {
          const fieldWrap = document.getElementById("field-wrap");
          const scatterLayer = document.getElementById("grid-scatter-layer");
          if (!grid || !fieldWrap) return;
          grid.innerHTML = "";
          if (scatterLayer) scatterLayer.innerHTML = "";
          grid.className =
            "relative z-0 grid gap-0 border-t border-l border-gray-600 " +
            GRID_COL_CLASS[gridSize] +
            " " +
            GRID_ROW_CLASS[gridSize];
          grid.setAttribute("aria-label", gridSize + "×" + gridSize + " 게임 그리드");
          const px = gridSize * CELL_PX;
          fieldWrap.style.width = px + "px";
          fieldWrap.style.height = px + "px";

          cellElements = [];
          for (let row = 0; row < gridSize; row++) {
            cellElements[row] = [];
            for (let col = 0; col < gridSize; col++) {
              const index = row * gridSize + col;
              const cell = document.createElement("div");
              cell.className = cellClass;
              cell.dataset.index = String(index);
              cell.dataset.row = String(row);
              cell.dataset.col = String(col);
              cellElements[row][col] = cell;
              bindCellTooltip(cell, row, col);
              cell.addEventListener("click", function handleCellClick(e) {
                const r = Number(cell.dataset.row);
                const c = Number(cell.dataset.col);
                const data = GridState.getCell(r, c);

                if (data.type === null) {
                  e.stopPropagation();
                  openPlantSelectUI(r, c, cell);
                  return;
                }

                if (!data.isReady) return;

                if (data.variant) return;

                const harvested = data.type;
                GridState.updateCell(r, c, {
                  type: null,
                  variant: null,
                  growthTime: 0,
                  isReady: false,
                  plantedAt: null,
                  matureAt: null,
                });
                spawnScatteredHarvestItem(harvested, r, c);
                if (harvested === "circle") {
                  const bonus = rollCircleHarvestBonus();
                  if (bonus === "square") {
                    spawnScatteredHarvestItem("square", r, c);
                  } else if (bonus === "circle") {
                    spawnScatteredHarvestItem("circle", r, c);
                  } else if (bonus === "circle_green") {
                    spawnScatteredHarvestItem("circle", r, c, "circle_green");
                  } else if (bonus === "circle_gold") {
                    spawnScatteredHarvestItem("circle", r, c, "circle_gold");
                  }
                } else if (harvested === "square") {
                  const sb = rollSquareHarvestBonus();
                  if (sb === "circle") {
                    spawnScatteredHarvestItem("circle", r, c);
                  } else if (sb === "triangle") {
                    spawnScatteredHarvestItem("triangle", r, c);
                  } else if (sb === "square_gold") {
                    spawnScatteredHarvestItem("square", r, c, "square_gold");
                  }
                } else if (harvested === "triangle") {
                  const tb = rollTriangleHarvestBonus();
                  if (tb === "two_circles") {
                    spawnScatteredHarvestItem("circle", r, c);
                    spawnScatteredHarvestItem("circle", r, c);
                  } else if (tb === "square") {
                    spawnScatteredHarvestItem("square", r, c);
                  } else if (tb === "triangle_green") {
                    spawnScatteredHarvestItem("triangle", r, c, "triangle_green");
                  }
                }
              });
              grid.appendChild(cell);
            }
          }
        }

        function applyGridExpansion() {
          if (gridSize >= GRID_MAX_SIZE) return;
          const nextSide = gridSize + 1;
          if (!canAffordGridExpand(nextSide)) return;
          payGridExpandCost(nextSide);
          const oldCells = GridState.cells;
          const oldN = gridSize;
          gridSize = nextSide;
          const newCells = [];
          for (let r = 0; r < gridSize; r++) {
            newCells[r] = [];
            for (let c = 0; c < gridSize; c++) {
              if (r < oldN && c < oldN) {
                newCells[r][c] = Object.assign({}, oldCells[r][c]);
              } else {
                newCells[r][c] = createEmptyCell();
              }
            }
          }
          GridState.cells = newCells;
          closePlantSelectUI();
          buildGridDom();
          renderGrid();
          renderInventory();
        }

        document.getElementById("grid-upgrade-btn")?.addEventListener("click", function () {
          applyGridExpansion();
        });

        buildGridDom();
        updateGridUpgradeUi();

        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") closePlantSelectUI();
        });

        document.addEventListener("click", function (e) {
          const panel = document.getElementById("plant-select-panel");
          if (!panel || panel.classList.contains("hidden")) return;
          if (panel.contains(e.target)) return;
          closePlantSelectUI();
        });

        renderGrid();
        renderInventory();
        renderCodex();

        const GROWTH_TICK_MS = 250;
        setInterval(tickGrowth, GROWTH_TICK_MS);

        window.GridState = GridState;
        window.playerInventory = playerInventory;
        window.GRID_EXPAND_COST = GRID_EXPAND_COST;

        console.log("게임 그리드 준비됨:", grid.children.length, "셀");
      })();
    </script>
  </body>
</html>
